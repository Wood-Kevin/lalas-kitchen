  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n            <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"24\">\n              <span style=\"width: 12px; height: 12px; border-radius: 50%; background: {{ d.fill }}; border: 1.5px solid {{ d.border }}; box-sizing: border-box;\"><\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- next up card -->\n        <div style=\"margin: 18px 24px 0 24px; background: #FBF3E1; border: 1.5px solid #D9C79E; border-radius: 24px; overflow: hidden;\">\n          <div style=\"height: 10px; background-color: #FBF3E1; background-image: repeating-linear-gradient(0deg, rgba(168,58,46,0.3) 0px, rgba(168,58,46,0.3) 6px, transparent 6px, transparent 12px), repeating-linear-gradient(90deg, rgba(168,58,46,0.3) 0px, rgba(168,58,46,0.3) 6px, transparent 6px, transparent 12px);\"><\u002Fdiv>\n          <div style=\"padding: 16px 22px 18px 22px; display: flex; flex-direction: column; gap: 14px;\">\n            <div style=\"display: flex; align-items: center; gap: 16px;\">\n              <div style=\"width: 62px; height: 62px; flex-shrink: 0; border-radius: 20px; background: #F1E4C8; border: 1.5px solid #D9C79E; display: flex; align-items: center; justify-content: center;\">{{ nextIcon }}<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 2px;\">\n                <span style=\"font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #7C8F6E;\">Up next · Level {{ nextNum }}<\u002Fspan>\n                <span style=\"font-family: 'Baloo 2', cursive; font-weight: 600; font-size: 24px; color: #2B211A;\">{{ nextName }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ startNext }}\" style=\"border: none; cursor: pointer; font-family: 'Baloo 2', cursive; font-weight: 600; font-size: 19px; color: #FBF3E1; background: #A83A2E; border-radius: 18px; padding: 15px 20px; transition: background 0.2s ease;\" style-hover=\"background: #93322A\" style-active=\"transform: scale(0.98)\">Start cooking<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- browse all -->\n        <button onclick=\"{{ goLevels }}\" style=\"margin: 16px 24px 0 24px; cursor: pointer; background: none; border: 1.5px solid #D9C79E; border-radius: 18px; padding: 14px 20px; font-family: 'Nunito Sans', sans-serif; font-weight: 700; font-size: 16px; color: #2B211A; transition: background 0.2s ease;\" style-hover=\"background: #FBF3E1\">Browse all levels<\u002Fbutton>\n\n        <div style=\"flex: 1;\"><\u002Fdiv>\n\n        <p style=\"margin: 0 0 20px 0; text-align: center; font-size: 13px; color: #A8987F;\">No timers. No rush. The kitchen keeps.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== LEVEL SELECT ===================== -->\n    <sc-if value=\"{{ isLevels }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Level Select\" style=\"display: flex; flex-direction: column; height: 100%; animation: lk-fade 0.35s ease;\">\n\n        <!-- gingham trim -->\n        <div style=\"height: 12px; flex-shrink: 0; background-color: #FBF3E1; background-image: repeating-linear-gradient(0deg, rgba(168,58,46,0.38) 0px, rgba(168,58,46,0.38) 6px, transparent 6px, transparent 12px), repeating-linear-gradient(90deg, rgba(168,58,46,0.38) 0px, rgba(168,58,46,0.38) 6px, transparent 6px, transparent 12px);\"><\u002Fdiv>\n\n        <!-- header -->\n        <div style=\"padding: 22px 24px 16px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;\">\n          <button onclick=\"{{ goHome }}\" aria-label=\"Back to dashboard\" style=\"width: 44px; height: 44px; flex-shrink: 0; cursor: pointer; background: #FBF3E1; border: 1.5px solid #D9C79E; border-radius: 14px; font-size: 20px; color: #2B211A; display: flex; align-items: center; justify-content: center; transition: background 0.2s ease;\" style-hover=\"background: #F1E4C8\">‹<\u002Fbutton>\n          <div style=\"display: flex; flex-direction: column;\">\n            <h1 style=\"margin: 0; font-family: 'Baloo 2', cursive; font-weight: 600; font-size: 26px; color: #A83A2E; line-height: 1.1;\">All levels<\u002Fh1>\n            <span style=\"font-size: 13px; color: #6E5C49;\">{{ completedCount }} cooked · pick up wherever you like<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- list -->\n        <div style=\"flex: 1; overflow-y: auto; padding: 4px 24px 28px 24px; display: flex; flex-direction: column; gap: 10px;\">\n          <sc-for list=\"{{ levels }}\" as=\"lv\" hint-placeholder-count=\"8\">\n            <div style=\"display: flex; align-items: center; gap: 14px; background: {{ lv.bg }}; border: 1.5px solid {{ lv.border }}; border-radius: 20px; padding: 13px 16px;\">\n              <div style=\"width: 50px; height: 50px; flex-shrink: 0; border-radius: 16px; background: {{ lv.iconBg }}; display: flex; align-items: center; justify-content: center; opacity: {{ lv.iconOpacity }};\">{{ lv.icon }}<\u002Fdiv>\n              <div style=\"display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0;\">\n                <span style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: {{ lv.numColor }};\">Level {{ lv.num }}<\u002Fspan>\n                <span style=\"font-family: 'Baloo 2', cursive; font-weight: 600; font-size: 19px; color: #2B211A;\">{{ lv.name }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ lv.done }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%; background: rgba(124,143,110,0.18); display: flex; align-items: center; justify-content: center;\">{{ checkIcon }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ lv.current }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"flex-shrink: 0; font-size: 12px; font-weight: 700; color: #A83A2E; background: rgba(168,58,46,0.1); border-radius: 999px; padding: 6px 12px;\">up next<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 470, &quot;height&quot;: 920}, &quot;completedCount&quot;: {&quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 11, &quot;min&quot;: 0, &quot;max&quot;: 24, &quot;section&quot;: &quot;Progress&quot;}, &quot;showLives&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Dashboard&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 'splash' };\n\n  icon(kind, size) {\n    const h = React.createElement;\n    const s = size || 30;\n    const svg = (children) => h('svg', { width: s, height: s, viewBox: '0 0 32 32', style: { display: 'block' } }, ...children);\n    switch (kind) {\n      case 'tomato': return svg([\n        h('circle', { key: 'b', cx: 16, cy: 18, r: 11, fill: '#A83A2E' }),\n        h('ellipse', { key: 'l1', cx: 12.5, cy: 7.5, rx: 4, ry: 2.2, fill: '#7C8F6E', transform: 'rotate(-20 12.5 7.5)' }),\n        h('ellipse', { key: 'l2', cx: 19.5, cy: 7.5, rx: 4, ry: 2.2, fill: '#7C8F6E', transform: 'rotate(20 19.5 7.5)' }),\n      ]);\n      case 'lemon': return svg([\n        h('ellipse', { key: 'b', cx: 16, cy: 16, rx: 11.5, ry: 8.5, fill: '#E3A43B', transform: 'rotate(-18 16 16)' }),\n        h('circle', { key: 'n1', cx: 5.5, cy: 19.5, r: 2.2, fill: '#E3A43B' }),\n        h('circle', { key: 'n2', cx: 26.5, cy: 12.5, r: 2.2, fill: '#E3A43B' }),\n      ]);\n      case 'herbs': return svg([\n        h('rect', { key: 'st', x: 15, y: 8, width: 2, height: 20, rx: 1, fill: '#7C8F6E' }),\n        h('ellipse', { key: 'l1', cx: 10, cy: 12, rx: 4.5, ry: 2.4, fill: '#7C8F6E', transform: 'rotate(-35 10 12)' }),\n        h('ellipse', { key: 'l2', cx: 22, cy: 12, rx: 4.5, ry: 2.4, fill: '#7C8F6E', transform: 'rotate(35 22 12)' }),\n        h('ellipse', { key: 'l3', cx: 10, cy: 19, rx: 4.5, ry: 2.4, fill: '#7C8F6E', transform: 'rotate(-35 10 19)' }),\n        h('ellipse', { key: 'l4', cx: 22, cy: 19, rx: 4.5, ry: 2.4, fill: '#7C8F6E', transform: 'rotate(35 22 19)' }),\n        h('ellipse', { key: 'l5', cx: 16, cy: 6.5, rx: 2.4, ry: 3.6, fill: '#7C8F6E' }),\n      ]);\n      case 'garlic': return svg([\n        h('ellipse', { key: 'b', cx: 16, cy: 19.5, rx: 10, ry: 8.5, fill: '#C9B183' }),\n        h('ellipse', { key: 'n', cx: 16, cy: 11, rx: 4, ry: 5.5, fill: '#C9B183' }),\n        h('rect', { key: 's', x: 15, y: 4, width: 2.2, height: 5, rx: 1.1, fill: '#7C8F6E' }),\n        h('rect', { key: 'g1', x: 11.2, y: 15, width: 1.6, height: 10, rx: 0.8, fill: '#B39C6C' }),\n        h('rect', { key: 'g2', x: 19.2, y: 15, width: 1.6, height: 10, rx: 0.8, fill: '#B39C6C' }),\n      ]);\n      case 'chili': return svg([\n        h('rect', { key: 'b', x: 6, y: 12, width: 21, height: 9, rx: 4.5, fill: '#A83A2E', transform: 'rotate(24 16 16)' }),\n        h('circle', { key: 's', cx: 7.5, cy: 9.5, r: 3, fill: '#7C8F6E' }),\n      ]);\n      case 'spoon': return svg([\n        h('ellipse', { key: 'b', cx: 16, cy: 9.5, rx: 6.5, ry: 7, fill: '#C9B183' }),\n        h('rect', { key: 'h', x: 14.4, y: 15, width: 3.2, height: 13, rx: 1.6, fill: '#C9B183' }),\n      ]);\n      case 'flame': return svg([\n        h('path', { key: 'f', d: 'M16 4c2.5 5 8 7.5 8 13.5a8 8 0 0 1-16 0c0-3.5 1.8-5.8 3.5-8 .6 2.2 1.6 3.3 3 4C14.8 10 15.4 7 16 4Z', fill: '#F2793A' }),\n      ]);\n      case 'check': return svg([\n        h('path', { key: 'c', d: 'M8 17l5.5 5.5L24 11', fill: 'none', stroke: '#7C8F6E', strokeWidth: 3.5, strokeLinecap: 'round', strokeLinejoin: 'round' }),\n      ]);\n      default: return null;\n    }\n  }\n\n  renderVals() {\n    const total = 24;\n    let done = this.props.completedCount ?? 11;\n    done = Math.max(0, Math.min(total, Math.round(done)));\n    const showLives = this.props.showLives ?? true;\n\n    const kinds = ['tomato', 'lemon', 'herbs', 'garlic', 'chili', 'spoon'];\n    const names = [\n      'Tomato Toss', 'Lemon Squeeze', 'Herb Garden', 'Garlic Press', 'A Little Heat', 'Slow Stir',\n      'Sauce Basics', 'Zest for Days', 'Window Box', 'Sunday Roast', 'Pepper Patch', 'Wooden Spoon',\n      'Simmer Down', 'Lemonade Stand', 'Fresh Cuttings', 'Braided Bulbs', 'Warm the Pot', 'Second Helping',\n      'Harvest Basket', 'Golden Hour', 'Kitchen Sill', 'Pantry Shelf', 'Ember Glow', 'Family Recipe',\n    ];\n\n    const levels = names.map((name, i) => {\n      const isDone = i < done;\n      const isCurrent = i === done;\n      return {\n        num: i + 1,\n        name: name,\n        icon: this.icon(kinds[i % kinds.length], 28),\n        done: isDone,\n        current: isCurrent,\n        bg: isCurrent ? '#FBF3E1' : (isDone ? '#FBF3E1' : 'rgba(251,243,225,0.55)'),\n        border: isCurrent ? 'rgba(168,58,46,0.45)' : '#D9C79E',\n        iconBg: '#F1E4C8',\n        iconOpacity: isDone || isCurrent ? 1 : 0.75,\n        numColor: isCurrent ? '#A83A2E' : '#A8987F',\n      };\n    });\n\n    const next = levels[Math.min(done, total - 1)];\n    const remaining = total - done;\n    const progressLine = done === 0\n      ? 'A fresh recipe book, ready when you are.'\n      : done === total\n        ? 'Every recipe cooked. The kitchen smells wonderful.'\n        : done + ' recipes cooked, ' + remaining + ' still waiting on the shelf. No hurry.';\n\n    return {\n      isSplash: this.state.screen === 'splash',\n      isHome: this.state.screen === 'home',\n      isLevels: this.state.screen === 'levels',\n      goLevels: () => this.setState({ screen: 'levels' }),\n      goHome: () => this.setState({ screen: 'home' }),\n      startNext: () => this.setState({ screen: 'levels' }),\n      showLives: showLives,\n      flames: [1, 2, 3, 4, 5].map((i) => ({ icon: this.icon('flame', 18) })),\n      completedCount: done,\n      totalCount: total,\n      progressLine: progressLine,\n      dots: names.map((n, i) => ({\n        fill: i < done ? '#7C8F6E' : 'transparent',\n        border: i < done ? '#7C8F6E' : '#D9C79E',\n      })),\n      nextIcon: this.icon(next.icon ? kinds[(next.num - 1) % kinds.length] : 'tomato', 36),\n      nextNum: next.num,\n      nextName: next.name,\n      levels: levels,\n      checkIcon: this.icon('check', 20),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
